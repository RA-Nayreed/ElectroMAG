services:
  maxima:
    image: mathinstitut/goemaxima:2026042200-latest
    tmpfs:
      - /tmp
    restart: unless-stopped
    cap_add:
      - SETGID
      - SETUID
    cap_drop:
      - ALL
    environment:
      GOEMAXIMA_QUEUE_LEN: 32
    read_only: true

  stack:
    image: stackmaths/stackapi:2026042200-latest
    restart: unless-stopped
    ports:
      - 3080:80
